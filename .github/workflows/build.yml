name: Build Phoenix Firefighter AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Android app (frontend/ — SoundClassifier, Kotlin + AGP 9)
  # ---------------------------------------------------------------
  android-app:
    name: Android app (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare CI environment
        run: |
          # local.properties points at a Windows SDK path — must not exist on CI
          rm -f frontend/local.properties
          chmod +x frontend/gradlew

      - name: Prepare Android SDK
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          # compileSdk 36.1 — pre-install if available; AGP auto-downloads otherwise
          "$SDKMANAGER" "platforms;android-36.1" > /dev/null 2>&1 || true

      - name: Build debug APK
        working-directory: frontend
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Run unit tests
        working-directory: frontend
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundclassifier-debug-apk
          path: frontend/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Arduino UNO Q sketches (STM32U585 MCU, arduino:zephyr core)
  # ---------------------------------------------------------------
  arduino-sketches:
    name: Arduino UNO Q sketches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage sketches needing normalization
        run: |
          # simple/sketch.ino doesn't match its folder name; arduino-cli
          # requires <folder>/<folder>.ino, so stage a compliant copy.
          mkdir -p .ci/simple_firefighter
          cp frontend/fall_detection_unoq/simple/sketch.ino \
             .ci/simple_firefighter/simple_firefighter.ino
          # adxl345_test has an App Lab sketch.yaml whose default profile
          # (empty fqbn, no Arduino_RouterBridge) overrides this workflow's
          # settings. Stage the .ino alone so it compiles like the others.
          mkdir -p .ci/adxl345_test
          cp arduino/adxl345_test/adxl345_test/sketch/sketch.ino \
             .ci/adxl345_test/adxl345_test.ino

      - name: Compile sketches for arduino:zephyr:unoq
        uses: arduino/compile-sketches@v1
        with:
          fqbn: arduino:zephyr:unoq
          platforms: |
            - name: arduino:zephyr
          libraries: |
            - name: Arduino_RouterBridge
            - name: Adafruit ADXL345
            - name: Adafruit Unified Sensor
            - name: Adafruit BusIO
            - name: DHT sensor library
          sketch-paths: |
            - .ci/adxl345_test
            - frontend/fall_detection_unoq/sketch
            - .ci/simple_firefighter
          enable-warnings-report: true

  # ---------------------------------------------------------------
  # Python (UNO Q bridge scripts, AI-PC servers, fall detection)
  # ---------------------------------------------------------------
  python-code:
    name: Python components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: '**/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          find . -name requirements.txt -not -path './.git/*' \
            -exec pip install -r {} \;

      - name: Syntax check (all tracked Python files)
        run: python -m compileall -q $(git ls-files '*.py')

  # ---------------------------------------------------------------
  # Gate: everything must be green
  # ---------------------------------------------------------------
  build-ok:
    name: All builds passed
    needs: [android-app, arduino-sketches, python-code]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All components built with 0 errors."
