name: Build Phoenix Firefighter AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------- Python components: ai, backend, cloud, models, maps ----------
  python-build:
    name: Build ${{ matrix.component }} (Python)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [ai, backend, cloud, models, maps]
    steps:
      - uses: actions/checkout@v4

      - name: Check for Python code
        id: check
        run: |
          if ls ${{ matrix.component }}/*.py >/dev/null 2>&1 || find ${{ matrix.component }} -name "*.py" | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Python files in ${{ matrix.component }}, skipping."
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.found == 'true'
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install dependencies
        if: steps.check.outputs.found == 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f "${{ matrix.component }}/requirements.txt" ]; then
            pip install -r "${{ matrix.component }}/requirements.txt"
          elif [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi

      - name: Syntax check (compile all Python files)
        if: steps.check.outputs.found == 'true'
        run: python -m compileall -q ${{ matrix.component }}

  # ---------- Web components: frontend, dashboard ----------
  web-build:
    name: Build ${{ matrix.component }} (Web)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [frontend, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if [ -f "${{ matrix.component }}/package.json" ]; then
            echo "type=node" >> "$GITHUB_OUTPUT"
          elif ls ${{ matrix.component }}/*.html >/dev/null 2>&1; then
            echo "type=static" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
            echo "No web project in ${{ matrix.component }}, skipping."
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.type == 'node'
        with:
          node-version: '20'

      - name: Install and build (Node)
        if: steps.detect.outputs.type == 'node'
        working-directory: ${{ matrix.component }}
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build --if-present

      - name: Validate HTML (static site)
        if: steps.detect.outputs.type == 'static'
        run: |
          echo "Static site detected — listing files:"
          find ${{ matrix.component }} -name "*.html" -o -name "*.js" -o -name "*.css" | head -50

      - name: Upload build artifact
        if: steps.detect.outputs.type == 'node'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component }}-build
          path: |
            ${{ matrix.component }}/dist
            ${{ matrix.component }}/build
          if-no-files-found: ignore

  # ---------- Arduino UNO Q sketch ----------
  arduino-build:
    name: Compile Arduino sketch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for sketches
        id: check
        run: |
          if find arduino -name "*.ino" | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No .ino sketches found, skipping."
          fi

      - name: Install arduino-cli
        if: steps.check.outputs.found == 'true'
        uses: arduino/setup-arduino-cli@v2

      - name: Compile sketches
        if: steps.check.outputs.found == 'true'
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          for sketch in $(find arduino -name "*.ino" -exec dirname {} \; | sort -u); do
            echo "Compiling $sketch"
            arduino-cli compile --fqbn arduino:avr:uno "$sketch" || exit 1
          done
